name: CI/CD

# Declenchee a chaque push et sur les pull requests
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ----------------------------------------------------------------
  #  Backend : build + tests + controle de couverture (JaCoCo >= 60%)
  # ----------------------------------------------------------------
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurer JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build, tests et couverture
        run: mvn -B clean verify

      - name: Publier le rapport de couverture backend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco

  # ----------------------------------------------------------------
  #  Frontend : build + tests Jest avec couverture (--coverage >= 60%)
  # ----------------------------------------------------------------
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dependances
        run: npm ci

      - name: Tests unitaires + couverture
        run: npm run test:coverage

      - name: Build de production
        run: npm run build

      - name: Publier le rapport de couverture frontend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  # ----------------------------------------------------------------
  #  Images Docker : build + push sur Docker Hub (branche main uniquement)
  # ----------------------------------------------------------------
  docker:
    name: Build & push images Docker Hub
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion a Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pmt-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pmt-backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pmt-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pmt-frontend:${{ github.sha }}
