# ----- Application -----
spring.application.name=pmt-backend
server.port=${SERVER_PORT:8080}

# ----- Base de donnees PostgreSQL (surchargee par variables d'environnement en Docker) -----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pmt}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pmt}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pmt}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ----- CORS (frontend Angular) -----
pmt.cors.allowed-origins=${PMT_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ----- E-mail (desactive par defaut ; les notifications sont alors journalisees) -----
pmt.mail.enabled=${PMT_MAIL_ENABLED:false}
pmt.mail.from=${PMT_MAIL_FROM:noreply@pmt.local}
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}

# ----- OpenAPI / Swagger -----
springdoc.swagger-ui.path=/swagger-ui.html
